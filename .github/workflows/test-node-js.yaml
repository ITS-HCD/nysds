# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Test Build with Node.js

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches:
      - 'develop'
      - 'main'

jobs:
  build:

    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: ['24.x']

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install dependencies
      run: npm i
    - name: Disable apt background services
      run: |
        sudo systemctl stop unattended-upgrades || true
        sudo systemctl disable unattended-upgrades || true
        sudo systemctl stop apt-daily.service apt-daily-upgrade.service || true
        sudo systemctl disable apt-daily.timer apt-daily-upgrade.timer || true
        sudo apt-get remove -y needrestart || true
        sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock
    - name: Install Playwright browsers
      run: |
        node node_modules/.bin/playwright install-deps
        node node_modules/.bin/playwright install chrome webkit firefox
      env:
        DEBIAN_FRONTEND: noninteractive
    - name: Build Packages
      run: npm run build:all
    - name: Test Components
      run: npm run test:all
    - name: Build Storybook
      run: npm run storybook:cibuild
